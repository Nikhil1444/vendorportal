<!DOCTYPE html>
<html>

<head>

<title>Vendor Portal Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    width:100%;
    height:100vh;

    background:url("{{ url_for('static', filename='background.jpg') }}");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    overflow:hidden;
}

/* OVERLAY */

.overlay{
    width:100%;
    height:100vh;

    background:rgba(0,0,0,0.45);

    display:flex;
    justify-content:center;
    align-items:center;
}

/* LOGIN BOX */

.login-box{

    width:430px;

    padding:40px;

    border-radius:30px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:0 8px 32px rgba(0,0,0,0.35);

    text-align:center;

    color:white;
}

/* LOGO */

.logo{
    width:220px;

    display:block;

    margin:0 auto 25px auto;
}

/* TITLE */

h2{
    margin-bottom:35px;
    font-size:38px;
    color:white;
}

/* INPUTS */

input{
    width:100%;

    padding:15px;

    margin-bottom:22px;

    border:none;

    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,0.18);

    border:1px solid rgba(255,255,255,0.2);

    color:white;

    font-size:16px;
}

input::placeholder{
    color:#eeeeee;
}

/* BUTTON */

button{
    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:#2563eb;

    color:white;

    font-size:20px;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
    transform:scale(1.02);
}

/* FORGOT PASSWORD */

.forgot{
    margin-top:18px;
    text-align:center;
}

.forgot a{
    color:#ffffff;
    font-size:15px;
    font-weight:bold;
    text-decoration:none;
}

.forgot a:hover{
    text-decoration:underline;
    color:#60a5fa;
}

/* ERROR MESSAGE */

.error{
    background:#ef4444;

    padding:12px;

    border-radius:10px;

    margin-bottom:20px;

    color:white;

    font-size:15px;
}

/* FOOTER */

.footer{
    margin-top:25px;
    font-size:14px;
    color:#dddddd;
}

</style>

</head>

<body>

<div class="overlay">

<div class="login-box">

<!-- LOGO -->

<img src="{{ url_for('static', filename='logo.png') }}"
class="logo">

<!-- TITLE -->

<h2>Vendor Portal</h2>

<!-- ERROR MESSAGE -->

{% if error %}

<div class="error">

{{ error }}

</div>

{% endif %}

<!-- LOGIN FORM -->

<form action="/dashboard" method="POST">

<input type="text"
name="username"
placeholder="Username"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

<!-- FORGOT PASSWORD -->

<div class="forgot">

<a href="/forgot-password">

Forgot Password?

</a>

</div>

<!-- FOOTER -->

<div class="footer">

JK Fenner Vendor Management System

</div>

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

    <title>JK Vendor Portal Login</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;

            background-image:url("{{ url_for('static', filename='background.jpg') }}");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:500px;

            background:rgba(255,255,255,0.15);

            backdrop-filter:blur(10px);

            padding:40px;

            border-radius:20px;

            text-align:center;

            box-shadow:0px 0px 25px black;

            border:1px solid rgba(255,255,255,0.3);
        }

        .logo{
            width:400px;
            height:auto;
            margin-bottom:20px;
        }

        h1{
            color:white;
            margin-bottom:30px;
            font-size:35px;
            text-shadow:2px 2px 5px black;
        }

        input{
            width:90%;
            padding:14px;
            margin:12px 0;

            border:none;
            border-radius:8px;

            font-size:16px;
        }

        button{
            width:95%;
            padding:14px;

            background:blue;
            color:white;

            border:none;
            border-radius:8px;

            font-size:18px;

            cursor:pointer;

            margin-top:15px;
        }

        button:hover{
            background:darkblue;
        }

        .forgot-password{
            margin-top:18px;
        }

        .forgot-password a{
            color:white;
            text-decoration:none;
            font-size:16px;
            font-weight:bold;
        }

        .forgot-password a:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

        <h1>JK Vendor Portal Login</h1>

        <form method="POST">

            <input type="text" name="username" placeholder="Enter Username" required>

            <input type="password" name="password" placeholder="Enter Password" required>

            <button type="submit">Login</button>

        </form>

        <div class="forgot-password">

            <a href="#">Forgot Password?</a>

        </div>

    </div>

</body>

</html>

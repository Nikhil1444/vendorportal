<!DOCTYPE html>
<html>

<head>

<title>Vendor Portal Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    width:100%;
    height:100vh;

    background:url("{{ url_for('static', filename='background.jpg') }}");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    overflow:hidden;
}

/* DARK OVERLAY */

.overlay{
    width:100%;
    height:100vh;

    background:rgba(0,0,0,0.45);

    display:flex;
    justify-content:center;
    align-items:center;
}

/* GLASS LOGIN BOX */

.login-box{

    width:400px;

    padding:40px;

    border-radius:25px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:0 8px 32px rgba(0,0,0,0.35);

    text-align:center;

    color:white;
}

/* LOGO */

.logo{
    width:200px;

    display:block;

    margin:0 auto 25px auto;
}

/* TITLE */

h2{
    margin-bottom:30px;
    font-size:36px;
    color:white;
}

/* INPUT BOX */

.input-box{
    margin-bottom:20px;
}

input{
    width:100%;

    padding:14px;

    border:none;

    outline:none;

    border-radius:10px;

    background:rgba(255,255,255,0.18);

    border:1px solid rgba(255,255,255,0.2);

    color:white;

    font-size:16px;
}

/* PLACEHOLDER */

input::placeholder{
    color:#eeeeee;
}

/* LOGIN BUTTON */

button{
    width:100%;

    padding:14px;

    border:none;

    border-radius:10px;

    background:#2563eb;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
    transform:scale(1.02);
}

/* FOOTER */

.footer{
    margin-top:20px;
    font-size:14px;
    color:#dddddd;
}

</style>

</head>

<body>

<div class="overlay">

<div class="login-box">

<!-- LOGO -->

<img src="{{ url_for('static', filename='logo.png') }}"
class="logo">

<!-- TITLE -->

<h2>Vendor Portal</h2>

<!-- LOGIN FORM -->

<form action="/dashboard" method="POST">

<div class="input-box">

<input type="text"
name="username"
placeholder="Username"
required>

</div>

<div class="input-box">

<input type="password"
name="password"
placeholder="Password"
required>

</div>

<button type="submit">

Login

</button>

</form>

<div class="footer">

JK Fenner Vendor Management System

</div>

</div>

</div>

</body>
</html>

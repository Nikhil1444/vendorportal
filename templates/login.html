<!DOCTYPE html>
<html>

<head>

<title>Vendor Login</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:url("{{ url_for('static', filename='background.jpg') }}");
    background-size:cover;
    background-position:center;
}

.overlay{
    width:100%;
    height:100vh;
    background:rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:300px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    text-align:center;
}

.logo{
    width:300px;
    display:block;
    margin:0 auto 25px auto;
}

h2{
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<div class="overlay">

<div class="login-box">

<img src="{{ url_for('static', filename='logo.png') }}"
class="logo">

<h2>Vendor Portal Login</h2>

<form action="/dashboard" method="POST">

<input type="text"
name="username"
placeholder="Username"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

</div>

</div>

</body>
</html>

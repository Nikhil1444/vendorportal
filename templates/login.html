<!DOCTYPE html>
<html>

<head>

<title>Vendor Portal Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    width:100%;
    height:100vh;

    background:url("{{ url_for('static', filename='background.jpg') }}");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.overlay{
    width:100%;
    height:100vh;

    background:rgba(0,0,0,0.45);

    display:flex;
    justify-content:center;
    align-items:center;
}

/* LOGIN BOX */

.login-box{

    width:420px;

    padding:40px;

    border-radius:25px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:0 8px 32px rgba(0,0,0,0.35);

    text-align:center;

    color:white;
}

/* LOGO */

.logo{
    width:200px;

    display:block;

    margin:0 auto 25px auto;
}

/* TITLE */

h2{
    margin-bottom:30px;
    font-size:34px;
    color:white;
}

/* INPUT */

input{
    width:100%;

    padding:14px;

    margin-bottom:20px;

    border:none;

    border-radius:10px;

    background:rgba(255,255,255,0.18);

    border:1px solid rgba(255,255,255,0.2);

    color:white;

    font-size:16px;
}

input::placeholder{
    color:#eeeeee;
}

/* LOGIN BUTTON */

button{
    width:100%;

    padding:14px;

    border:none;

    border-radius:10px;

    background:#2563eb;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

/* FORGOT PASSWORD */

.forgot{
    margin-top:15px;
}

.forgot a{
    color:#ffffff;
    text-decoration:none;
    font-size:14px;
}

.forgot a:hover{
    text-decoration:underline;
}

/* ERROR MESSAGE */

.error{
    background:#ef4444;

    padding:12px;

    border-radius:8px;

    margin-bottom:20px;

    color:white;

    font-size:15px;
}

.footer{
    margin-top:20px;
    color:#dddddd;
}

</style>

</head>

<body>

<div class="overlay">

<div class="login-box">

<img src="{{ url_for('static', filename='logo.png') }}"
class="logo">

<h2>Vendor Portal</h2>

<!-- ERROR MESSAGE -->

{% if error %}

<div class="error">

{{ error }}

</div>

{% endif %}

<form action="/dashboard" method="POST">

<input type="text"
name="username"
placeholder="Username"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

<!-- FORGOT PASSWORD -->

<div class="forgot">

<a href="/forgot-password">

Forgot Password?

</a>

</div>

<div class="footer">

JK Fenner Vendor Management System

</div>

</div>

</div>

</body>
</html>

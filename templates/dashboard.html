<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f3f4f6;
}

/* TOP HEADER */

.topbar{
    background:#111827;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* MENU */

.menu{
    position:relative;
}

.menu-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
}

.dropdown{
    display:none;
    position:absolute;
    right:0;
    top:45px;
    background:white;
    min-width:200px;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.dropdown a{
    display:block;
    padding:14px;
    text-decoration:none;
    color:black;
}

.dropdown a:hover{
    background:#f3f4f6;
}

.menu:hover .dropdown{
    display:block;
}

/* CONTENT */

.content{
    padding:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="topbar">

<h2>Vendor Dashboard</h2>

<div class="menu">

<button class="menu-btn">
Nikhil ▼
</button>

<div class="dropdown">

<a href="#">
Change Password
</a>

<a href="/logout">
Logout
</a>

</div>

</div>

</div>

<!-- PAGE CONTENT -->

<div class="content">

<div class="card">

<h1>Welcome to Vendor Portal</h1>

<p>
PO details, dispatch updates,
commitment dates and vendor data
will appear here.
</p>

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

    <title>Vendor Management Dashboard</title>

    <style>

        body{
            margin:0;
            padding:20px;
            font-family:Arial;

            background-image:url("{{ url_for('static', filename='background.jpg') }}");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            min-height:100vh;
        }

        .dashboard-box{

            background:rgba(255,255,255,0.15);

            backdrop-filter:blur(10px);

            padding:30px;

            border-radius:20px;

            box-shadow:0px 0px 25px black;

            border:1px solid rgba(255,255,255,0.3);
        }

        .header{
            display:flex;
            align-items:center;
            margin-bottom:30px;
        }

        .logo{
            width:250px;
            height:auto;
            margin-right:30px;
        }

        h1{
            color:white;
            font-size:38px;
            text-shadow:2px 2px 5px black;
        }

        table{
            width:100%;
            border-collapse:collapse;

            background:rgba(255,255,255,0.90);

            border-radius:10px;
            overflow:hidden;
        }

        th{
            background:blue;
            color:white;
            padding:15px;
            font-size:18px;
        }

        td{
            padding:12px;
            border:1px solid lightgray;
            text-align:center;
            font-size:16px;
        }

        tr:hover{
            background:#f2f2f2;
        }

        .completed{
            background:green;
            color:white;
            padding:8px;
            border-radius:5px;
            font-weight:bold;
        }

        .pending{
            background:red;
            color:white;
            padding:8px;
            border-radius:5px;
            font-weight:bold;
        }

        .partial{
            background:yellow;
            color:black;
            padding:8px;
            border-radius:5px;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <div class="dashboard-box">

        <div class="header">

            <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

            <h1>Vendor Management Dashboard</h1>

        </div>

        <table>

            <tr>
                <th>PO No</th>
                <th>Material</th>
                <th>Size</th>
                <th>PO Qty</th>
                <th>Dispatch Qty</th>
                <th>Pending Qty</th>
                <th>Commitment Date</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>450001</td>
                <td>Belt</td>
                <td>A23</td>
                <td>1000</td>
                <td>600</td>
                <td>400</td>
                <td>20-May-2026</td>
                <td><span class="partial">PARTIAL COMPLETED</span></td>
            </tr>

            <tr>
                <td>450002</td>
                <td>Pulley</td>
                <td>B11</td>
                <td>500</td>
                <td>500</td>
                <td>0</td>
                <td>15-May-2026</td>
                <td><span class="completed">COMPLETED</span></td>
            </tr>

            <tr>
                <td>450003</td>
                <td>Coupling</td>
                <td>C15</td>
                <td>700</td>
                <td>0</td>
                <td>700</td>
                <td>25-May-2026</td>
                <td><span class="pending">NOT COMPLETED</span></td>
            </tr>

        </table>

    </div>

</body>

</html>

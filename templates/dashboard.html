<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f3f4f6;
}

/* HEADER */

.topbar{
    background:#111827;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo-section{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo{
    width:200px;
}

/* MENU */

.menu{
    position:relative;
    display:inline-block;
}

/* PROFILE BUTTON */

.menu-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
}

/* DROPDOWN */

.dropdown{

    display:none;

    position:absolute;

    right:0;

    top:100%;

    margin-top:0;

    background:white;

    min-width:220px;

    border-radius:10px;

    overflow:hidden;

    box-shadow:0 5px 15px rgba(0,0,0,0.2);

    z-index:999;
}

/* LINKS */

.dropdown a{

    display:block;

    padding:14px 18px;

    text-decoration:none;

    color:#111827;

    transition:0.2s;
}

.dropdown a:hover{

    background:#f3f4f6;
}

/* SHOW MENU */

.menu:hover .dropdown{

    display:block;
}
.menu-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
}

.dropdown{
    display:none;
    position:absolute;
    right:0;
    top:45px;
    background:white;
    min-width:200px;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.dropdown a{
    display:block;
    padding:14px;
    text-decoration:none;
    color:black;
}

.dropdown a:hover{
    background:#f3f4f6;
}

.menu:hover .dropdown{
    display:block;
}

/* DASHBOARD */

.content{
    padding:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card h3{
    margin-bottom:10px;
    color:#111827;
}

.card p{
    color:gray;
}

</style>

</head>

<body>

<!-- TOP HEADER -->

<div class="topbar">

<div class="logo-section">

<img src="{{ url_for('static', filename='logo.png') }}"
class="logo">

<h2>Vendor Dashboard</h2>

</div>

<div class="menu">

<button class="menu-btn">
Nikhil ▼
</button>

<div class="dropdown">

<a href="#">
Change Password
</a>

<a href="/logout">
Logout
</a>

</div>

</div>

</div>

<!-- CONTENT -->

<div class="content">

<h1>Welcome to Vendor Portal</h1>

<br>

<div class="cards">

<div class="card">
<h3>Total Orders</h3>
<p>125 Orders</p>
</div>

<div class="card">
<h3>Pending Orders</h3>
<p>32 Orders</p>
</div>

<div class="card">
<h3>Dispatch Completed</h3>
<p>78 Orders</p>
</div>

<div class="card">
<h3>Commitment Delays</h3>
<p>15 Orders</p>
</div>

</div>

</div>

</body>
</html>

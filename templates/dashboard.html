<!DOCTYPE html>
<html>

<head>

<title>Vendor Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f3f4f6;
}

/* TOP HEADER */

.topbar{

    background:#111827;

    color:white;

    padding:15px 30px;

    display:flex;

    align-items:center;
}

/* LEFT SECTION */

.left-section{

    display:flex;

    align-items:center;

    gap:15px;
}

/* LOGO */

.logo{

    width:45px;
}

/* MENU */

.menu{
    position:relative;
}

/* 3 LINE BUTTON */

.menu-btn{

    background:#2563eb;

    color:white;

    border:none;

    padding:8px 15px;

    border-radius:8px;

    cursor:pointer;

    font-size:22px;
}

/* DROPDOWN */

.dropdown{

    position:absolute;

    top:50px;

    left:0;

    width:240px;

    background:white;

    border-radius:12px;

    overflow:hidden;

    box-shadow:0 5px 15px rgba(0,0,0,0.2);

    display:none;

    z-index:9999;
}

/* SHOW MENU */

.menu:hover .dropdown{

    display:block;
}

/* MENU LINKS */

.dropdown a{

    display:block;

    padding:15px 20px;

    text-decoration:none;

    color:#111827;

    font-size:15px;

    border-bottom:1px solid #eeeeee;
}

.dropdown a:hover{

    background:#f3f4f6;
}

/* PAGE CONTENT */

.content{

    padding:30px;
}

/* DASHBOARD CARDS */

.cards{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

    margin-top:20px;
}

.card{

    background:white;

    padding:25px;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,0.08);

    transition:0.3s;
}

.card:hover{

    transform:translateY(-5px);
}

.card h3{

    margin-bottom:10px;

    color:#111827;
}

.card p{

    color:gray;

    font-size:18px;
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="left-section">

<!-- MENU -->

<div class="menu">

<button class="menu-btn">

☰

</button>

<div class="dropdown">

<a href="#">

Order Details

</a>

<a href="#">

Pending Orders

</a>

<a href="#">

Current Orders

</a>

<a href="#">

Dispatch Details

</a>

<a href="#">

Change Password

</a>

</div>

</div>

<!-- LOGO -->

<img src="{{ url_for('static', filename='logo.png') }}"
class="logo">

<h2>Vendor Dashboard</h2>

</div>

</div>

<!-- PAGE CONTENT -->

<div class="content">

<h1>Welcome to Vendor Portal</h1>

<br>

<div class="cards">

<div class="card">

<h3>Total Orders</h3>

<p>125 Orders</p>

</div>

<div class="card">

<h3>Pending Orders</h3>

<p>32 Orders</p>

</div>

<div class="card">

<h3>Dispatch Completed</h3>

<p>78 Orders</p>

</div>

<div class="card">

<h3>Commitment Delays</h3>

<p>15 Orders</p>

</div>

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

<title>Vendor Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f3f4f6;
}

/* TOP HEADER */

.topbar{

    width:100%;

    background:#111827;

    color:white;

    padding:15px 30px;

    display:flex;

    justify-content:space-between;

    align-items:center;
}

/* LOGO SECTION */

.logo-section{

    display:flex;

    align-items:center;

    gap:12px;
}

.logo{

    width:280px;
}

/* PROFILE MENU */

.menu{

    position:relative;

    display:inline-block;
}

/* PROFILE BUTTON */

.menu-btn{

    background:#2563eb;

    color:white;

    border:none;

    padding:10px 18px;

    border-radius:8px;

    cursor:pointer;

    font-size:15px;
}

/* DROPDOWN */

.dropdown{

    position:absolute;

    top:45px;

    right:0;

    width:220px;

    background:white;

    border-radius:10px;

    overflow:hidden;

    box-shadow:0 5px 15px rgba(0,0,0,0.2);

    display:none;

    z-index:9999;
}

/* SHOW DROPDOWN */

.menu:hover .dropdown{

    display:block;
}

/* DROPDOWN LINKS */

.dropdown a{

    display:block;

    padding:14px 18px;

    text-decoration:none;

    color:#111827;

    font-size:15px;

    transition:0.2s;
}

.dropdown a:hover{

    background:#f3f4f6;
}

/* PAGE CONTENT */

.content{

    padding:30px;
}

/* DASHBOARD CARDS */

.cards{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

    margin-top:20px;
}

.card{

    background:white;

    padding:25px;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,0.08);

    transition:0.3s;
}

.card:hover{

    transform:translateY(-5px);
}

.card h3{

    margin-bottom:10px;

    color:#111827;
}

.card p{

    color:gray;

    font-size:18px;
}

</style>

</head>

<body>

<!-- TOP HEADER -->

<div class="topbar">

<!-- LEFT SIDE -->

<div class="logo-section">

<img src="{{ url_for('static', filename='logo.png') }}"
class="logo">

<h2>Vendor Dashboard</h2>

</div>

<!-- RIGHT SIDE -->

<div class="menu">

<button class="menu-btn">

Nikhil ▼

</button>

<div class="dropdown">

<a href="#">

Change Password

</a>

<a href="/logout">

Logout

</a>

</div>

</div>

</div>

<!-- PAGE CONTENT -->

<div class="content">

<h1>Welcome to Vendor Portal</h1>

<br>

<div class="cards">

<div class="card">

<h3>Total Orders</h3>

<p>125 Orders</p>

</div>

<div class="card">

<h3>Pending Orders</h3>

<p>32 Orders</p>

</div>

<div class="card">

<h3>Dispatch Completed</h3>

<p>78 Orders</p>

</div>

<div class="card">

<h3>Commitment Delays</h3>

<p>15 Orders</p>

</div>

</div>

</div>

</body>
</html>
